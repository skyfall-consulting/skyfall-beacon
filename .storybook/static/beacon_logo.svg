<svg xmlns="http://www.w3.org/2000/svg" width="180" height="36" viewBox="0 0 180 36" fill="none">
  <defs>
    <linearGradient id="beaconGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F86F0"/>
      <stop offset="1" stop-color="#5546D1"/>
    </linearGradient>
  </defs>
  <!-- Beacon mark: stylized lighthouse beam / upward spark -->
  <g transform="translate(2,2)">
    <circle cx="16" cy="16" r="15" fill="url(#beaconGrad)"/>
    <!-- Beam shape -->
    <path d="M16 7 L20 18 L16 16 L12 18 Z" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="16" cy="16" r="2" fill="#FFFFFF"/>
    <!-- soft glow ring -->
    <circle cx="16" cy="16" r="13" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/>
  </g>
  <!-- Wordmark -->
  <text x="44" y="23" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#131B28" letter-spacing="-0.01em">Skyfall <tspan fill="#1F86F0" font-weight="700">Beacon</tspan></text>
</svg>
